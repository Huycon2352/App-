name: Deploy Dev Environment V2

on:
  workflow_dispatch:

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  TF_WORKING_DIR: "./infrastructure-v2/environments/dev"
  AWS_REGION: "ap-southeast-1"

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init
      
      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          PLAN_FILE="${GITHUB_WORKSPACE}/${{ env.TF_WORKING_DIR }}/tfplan"
          echo "Creating plan file at: ${PLAN_FILE}"
          terraform plan -lock=false -out="${PLAN_FILE}"
          echo "Plan file created successfully"
          ls -la "${PLAN_FILE}"
      
      - name: Validate Plan File
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          PLAN_FILE="${GITHUB_WORKSPACE}/${{ env.TF_WORKING_DIR }}/tfplan"
          echo "Checking plan file: ${PLAN_FILE}"
          if [ ! -f "${PLAN_FILE}" ]; then
            echo "ERROR: Plan file not found at ${PLAN_FILE}"
            exit 1
          fi
          FILE_SIZE=$(wc -c < "${PLAN_FILE}" | tr -d ' ')
          echo "Plan file size: ${FILE_SIZE} bytes"
          if [ "${FILE_SIZE}" -eq 0 ]; then
            echo "ERROR: Plan file is empty"
            exit 1
          fi
          echo "Plan file is valid"
      
      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          PLAN_FILE="${GITHUB_WORKSPACE}/${{ env.TF_WORKING_DIR }}/tfplan"
          echo "Applying plan from: ${PLAN_FILE}"
          terraform apply -lock=false -auto-approve "${PLAN_FILE}"
