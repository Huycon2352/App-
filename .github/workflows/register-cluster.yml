name: Register EKS Cluster To ArgoCD

on:
  workflow_dispatch:

jobs:
  register:
    name: Register Clusters
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-southeast-1

    steps:
      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # AWS AUTH
      # =========================================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      # =========================================================
      # INSTALL KUBECTL
      # =========================================================
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # =========================================================
      # INSTALL ARGOCD CLI
      # =========================================================
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64

          chmod +x argocd
          sudo mv argocd /usr/local/bin/

          argocd version --client

      # =========================================================
      # CONNECT MANAGEMENT CLUSTER
      # =========================================================
      - name: Connect management cluster
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region $AWS_REGION

          kubectl config current-context

      # =========================================================
      # WAIT ARGOCD READY
      # =========================================================
      - name: Wait ArgoCD Server Ready
        run: |
          kubectl rollout status deployment/argocd-server \
            -n argocd \
            --timeout=600s

      # =========================================================
      # GET ARGOCD PASSWORD
      # =========================================================
      - name: Get ArgoCD Password
        run: |
          PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)

          echo "ARGO_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # =========================================================
      # WAIT LOADBALANCER HOSTNAME
      # =========================================================
      - name: Get ArgoCD Endpoint
        run: |
          echo "Waiting for ArgoCD LoadBalancer..."

          for i in {1..30}; do
            HOST=$(kubectl get svc argocd-server -n argocd \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

            if [ ! -z "$HOST" ]; then
              echo "Found endpoint: $HOST"

              echo "ARGO_HOST=$HOST" >> $GITHUB_ENV

              exit 0
            fi

            echo "Waiting for LoadBalancer..."
            sleep 20
          done

          echo "ArgoCD LoadBalancer not ready"
          exit 1

      # =========================================================
      # TEST CONNECTIVITY
      # =========================================================
      - name: Test ArgoCD Connectivity
        run: |
          echo "Testing connection to $ARGO_HOST"

          curl -I http://$ARGO_HOST || true

      # =========================================================
      # LOGIN TO ARGOCD
      # =========================================================
      - name: Login ArgoCD
        run: |
          argocd login $ARGO_HOST \
            --username admin \
            --password "$ARGO_PASSWORD" \
            --insecure \
            --grpc-web \
            --plaintext

      # =========================================================
      # REGISTER DEV CLUSTER
      # =========================================================
      - name: Register dev cluster
        run: |
          aws eks update-kubeconfig \
            --name dev-cluster \
            --region $AWS_REGION \
            --alias dev-cluster

          kubectl config get-contexts

          argocd cluster add dev-cluster \
            --yes \
            --insecure \
            --grpc-web

      # =========================================================
      # OPTIONAL PROD CLUSTER
      # =========================================================
      - name: Register prod cluster
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name prod-cluster \
            --region $AWS_REGION \
            --alias prod-cluster

          argocd cluster add prod-cluster \
            --yes \
            --insecure \
            --grpc-web

      # =========================================================
      # VERIFY REGISTERED CLUSTERS
      # =========================================================
      - name: Verify clusters
        run: |
          argocd cluster list \
            --insecure \
            --grpc-web
