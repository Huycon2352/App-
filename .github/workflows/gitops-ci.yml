name: CI + GitOps Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-southeast-1
      ECR_REGISTRY: 248195880649.dkr.ecr.ap-southeast-1.amazonaws.com

    steps:
      # 1. Checkout source code
      - name: Checkout App Repo
        uses: actions/checkout@v4

      # 2. Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build Docker images
      - name: Build Images
        run: |
          docker build -t $ECR_REGISTRY/vote-app:${GITHUB_SHA} ./vote
          docker build -t $ECR_REGISTRY/result-app:${GITHUB_SHA} ./result
          docker build -t $ECR_REGISTRY/worker-app:${GITHUB_SHA} ./worker

      # 5. Push Docker images
      - name: Push Images
        run: |
          docker push $ECR_REGISTRY/vote-app:${GITHUB_SHA}
          docker push $ECR_REGISTRY/result-app:${GITHUB_SHA}
          docker push $ECR_REGISTRY/worker-app:${GITHUB_SHA}

      # 6. Install Kustomize
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # 7. Clone GitOps repo
      - name: Clone GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: hgiang25/k8s-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: k8s-gitops

      # 8. Update image tags
      - name: Update image tag
        run: |
          ENV=${{ github.event.inputs.environment }}

          cd k8s-gitops/apps/$ENV

          kustomize edit set image \
          248195880649.dkr.ecr.ap-southeast-1.amazonaws.com/vote-app=$ECR_REGISTRY/vote-app:${GITHUB_SHA}

          kustomize edit set image \
          248195880649.dkr.ecr.ap-southeast-1.amazonaws.com/result-app=$ECR_REGISTRY/result-app:${GITHUB_SHA}

          kustomize edit set image \
          248195880649.dkr.ecr.ap-southeast-1.amazonaws.com/worker-app=$ECR_REGISTRY/worker-app:${GITHUB_SHA}

      # 9. Commit and push GitOps changes
      - name: Commit and Push
        run: |
          ENV=${{ github.event.inputs.environment }}

          cd k8s-gitops

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --staged --quiet || git commit -m "update $ENV image to ${GITHUB_SHA}"

          git push origin main
