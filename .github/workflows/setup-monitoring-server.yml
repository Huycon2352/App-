name: Deploy Monitoring Stack (Management)

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  PROMETHEUS_NAMESPACE: monitoring
  PROMETHEUS_RELEASE_NAME: kube-prometheus-stack

jobs:
  # =========================================================
  # DEPLOY MONITORING STACK ON MANAGEMENT CLUSTER
  # =========================================================
  deploy-monitoring-stack:
    name: Deploy Prometheus + Grafana on Management
    runs-on: ubuntu-latest

    steps:
      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =====================================================
      # AWS AUTH
      # =====================================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =====================================================
      # INSTALL TOOLS
      # =====================================================
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      # =====================================================
      # CONNECT TO MANAGEMENT CLUSTER
      # =====================================================
      - name: Connect to Management Cluster
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region ${{ env.AWS_REGION }}
          
          echo "Current context:"
          kubectl config current-context

      # =====================================================
      # CREATE MONITORING NAMESPACE
      # =====================================================
      - name: Create Monitoring Namespace
        run: |
          kubectl create namespace ${{ env.PROMETHEUS_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Namespace status:"
          kubectl get ns ${{ env.PROMETHEUS_NAMESPACE }}

      # =====================================================
      # ADD PROMETHEUS HELM REPO
      # =====================================================
      - name: Add Prometheus Community Helm Repository
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          
          echo "Available prometheus-community charts:"
          helm search repo prometheus-community/kube-prometheus-stack

      # =====================================================
      # DEPLOY KUBE-PROMETHEUS-STACK
      # =====================================================
      - name: Deploy Kube Prometheus Stack
        run: |
          helm upgrade --install ${{ env.PROMETHEUS_RELEASE_NAME }} \
            prometheus-community/kube-prometheus-stack \
            --namespace ${{ env.PROMETHEUS_NAMESPACE }} \
            --values monitoring/helm-values/prometheus-values.yml \
            --wait \
            --timeout 10m

      # =====================================================
      # VERIFY DEPLOYMENT
      # =====================================================
      - name: Verify Prometheus Stack Deployment
        run: |
          echo "=== Monitoring Namespace Resources ==="
          kubectl get all -n ${{ env.PROMETHEUS_NAMESPACE }}
          
          echo ""
          echo "=== Prometheus Pod Status ==="
          kubectl get pods -n ${{ env.PROMETHEUS_NAMESPACE }} -l app.kubernetes.io/name=prometheus
          
          echo ""
          echo "=== Grafana Pod Status ==="
          kubectl get pods -n ${{ env.PROMETHEUS_NAMESPACE }} -l app.kubernetes.io/name=grafana

      # =====================================================
      # GET GRAFANA PASSWORD
      # =====================================================
      - name: Get Grafana Initial Password
        run: |
          GRAFANA_PASSWORD=$(kubectl get secret -n ${{ env.PROMETHEUS_NAMESPACE }} \
            ${{ env.PROMETHEUS_RELEASE_NAME }}-grafana \
            -o jsonpath="{.data.admin-password}" | base64 -d)
          
          echo "Grafana Admin Password: $GRAFANA_PASSWORD"
          echo "GRAFANA_PASSWORD=$GRAFANA_PASSWORD" >> $GITHUB_ENV

      # =====================================================
      # EXPOSE SERVICES
      # =====================================================
      - name: Get Service Endpoints
        run: |
          echo "=== Prometheus Service ==="
          kubectl get svc -n ${{ env.PROMETHEUS_NAMESPACE }} -l app.kubernetes.io/name=prometheus
          
          echo ""
          echo "=== Grafana Service ==="
          kubectl get svc -n ${{ env.PROMETHEUS_NAMESPACE }} -l app.kubernetes.io/name=grafana
          
          echo ""
          echo "=== AlertManager Service ==="
          kubectl get svc -n ${{ env.PROMETHEUS_NAMESPACE }} -l app.kubernetes.io/name=alertmanager

      # =====================================================
      # SETUP PORT FORWARDING INFO
      # =====================================================
      - name: Display Access Instructions
        run: |
          echo "=========================================="
          echo "✅ Monitoring Stack Deployed Successfully"
          echo "=========================================="
          echo ""
          echo "📊 PROMETHEUS:"
          echo "  kubectl port-forward -n ${{ env.PROMETHEUS_NAMESPACE }} svc/kube-prometheus-stack-prometheus 9090:9090"
          echo "  URL: http://localhost:9090"
          echo ""
          echo "📈 GRAFANA:"
          echo "  kubectl port-forward -n ${{ env.PROMETHEUS_NAMESPACE }} svc/kube-prometheus-stack-grafana 3000:80"
          echo "  URL: http://localhost:3000"
          echo "  Username: admin"
          echo "  Password: ${{ env.GRAFANA_PASSWORD }}"
          echo ""
          echo "🔔 ALERTMANAGER:"
          echo "  kubectl port-forward -n ${{ env.PROMETHEUS_NAMESPACE }} svc/kube-prometheus-stack-alertmanager 9093:9093"
          echo "  URL: http://localhost:9093"
          echo ""
