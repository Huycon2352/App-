name: Setup Monitoring Server (Management Cluster)

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  HELM_REPO: https://prometheus-community.github.io/helm-charts
  HELM_REPO_NAME: prometheus-community
  NAMESPACE: monitoring

jobs:
  setup-server:
    name: Setup Prometheus Server on Management Cluster
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # AWS AUTH
      # =========================================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================================================
      # INSTALL KUBECTL
      # =========================================================
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # =========================================================
      # INSTALL HELM
      # =========================================================
      - name: Install Helm
        uses: azure/setup-helm@v4

      # =========================================================
      # CONNECT MANAGEMENT CLUSTER
      # =========================================================
      - name: Connect to management cluster
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region ${{ env.AWS_REGION }}
          
          echo "Current context:"
          kubectl config current-context

      # =========================================================
      # CREATE NAMESPACE
      # =========================================================
      - name: Create monitoring namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} || true
          kubectl label namespace ${{ env.NAMESPACE }} name=${{ env.NAMESPACE }} --overwrite

      # =========================================================
      # ADD HELM REPO
      # =========================================================
      - name: Add Prometheus Helm repository
        run: |
          helm repo add ${{ env.HELM_REPO_NAME }} ${{ env.HELM_REPO }}
          helm repo update

      # =========================================================
      # INSTALL KUBE-PROMETHEUS-STACK (SERVER)
      # =========================================================
      - name: Install kube-prometheus-stack (Server Mode)
        run: |
          helm install kube-prometheus-stack \
            ${{ env.HELM_REPO_NAME }}/kube-prometheus-stack \
            --namespace ${{ env.NAMESPACE }} \
            --values infrastructure/helm/monitoring/values-central.yaml \
            --wait \
            --timeout 5m

      # =========================================================
      # CREATE NODEPORT SERVICE FOR PROMETHEUS (Remote Write)
      # =========================================================
      - name: Create NodePort service for Prometheus
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: prometheus-remote-write
            namespace: ${{ env.NAMESPACE }}
            labels:
              app: prometheus
              component: remote-write-endpoint
          spec:
            type: NodePort
            ports:
            - name: web
              port: 9090
              targetPort: 9090
              nodePort: 30090
              protocol: TCP
            selector:
              app.kubernetes.io/name: prometheus
              prometheus: kube-prometheus-stack-prometheus
          EOF
          
          echo "✅ NodePort service created (Port: 30090)"

      # =========================================================
      # ENSURE GRAFANA IS CLUSTERIP ONLY (NO EXPOSURE)
      # =========================================================
      - name: Update Grafana service to ClusterIP
        run: |
          # Patch service to remove LoadBalancer if it exists
          kubectl patch svc kube-prometheus-stack-grafana \
            -n ${{ env.NAMESPACE }} \
            -p '{"spec":{"type":"ClusterIP"}}' || true
          
          echo "✅ Grafana service set to ClusterIP (Private)"

      # =========================================================
      # ENSURE ALERTMANAGER IS CLUSTERIP ONLY
      # =========================================================
      - name: Update Alertmanager service to ClusterIP
        run: |
          kubectl patch svc kube-prometheus-stack-alertmanager \
            -n ${{ env.NAMESPACE }} \
            -p '{"spec":{"type":"ClusterIP"}}' || true
          
          echo "✅ Alertmanager service set to ClusterIP (Private)"

      # =========================================================
      # WAIT FOR DEPLOYMENTS
      # =========================================================
      - name: Wait for Prometheus deployment
        run: |
          kubectl rollout status deployment/kube-prometheus-stack-prometheus \
            -n ${{ env.NAMESPACE }} \
            --timeout=600s

      - name: Wait for Grafana deployment
        run: |
          kubectl rollout status deployment/kube-prometheus-stack-grafana \
            -n ${{ env.NAMESPACE }} \
            --timeout=600s

      # =========================================================
      # GET PROMETHEUS NODEPORT ENDPOINT (For agents)
      # =========================================================
      - name: Get Prometheus NodePort endpoint
        run: |
          echo "Getting Prometheus NodePort endpoint..."
          
          # For AWS: Use node IP
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}')
          
          if [ -z "$NODE_IP" ]; then
            NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          fi
          
          # For Kind: fallback to localhost
          if [ -z "$NODE_IP" ]; then
            NODE_IP="localhost"
          fi
          
          NODE_PORT=$(kubectl get svc prometheus-remote-write -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.spec.ports[0].nodePort}')
          
          PROMETHEUS_ENDPOINT="http://$NODE_IP:$NODE_PORT"
          
          echo "✅ Prometheus endpoint: $PROMETHEUS_ENDPOINT"
          echo "PROMETHEUS_ENDPOINT=$PROMETHEUS_ENDPOINT" >> $GITHUB_ENV
          echo "NODE_IP=$NODE_IP" >> $GITHUB_ENV
          echo "NODE_PORT=$NODE_PORT" >> $GITHUB_ENV

      # =========================================================
      # VERIFY PROMETHEUS ACCESSIBLE
      # =========================================================
      - name: Verify Prometheus remote write receiver
        run: |
          echo "Testing Prometheus remote write endpoint..."
          
          # Port-forward to test
          kubectl port-forward -n ${{ env.NAMESPACE }} \
            svc/prometheus-remote-write 9090:9090 &
          PF_PID=$!
          
          sleep 3
          
          # Test metrics query
          if curl -s http://localhost:9090/api/v1/query?query=up | jq -e '.status == "success"' > /dev/null; then
            echo "✅ Prometheus is responding correctly"
          else
            echo "⚠️  Prometheus query endpoint test failed (may be normal)"
          fi
          
          kill $PF_PID 2>/dev/null || true

      # =========================================================
      # GET GRAFANA CREDENTIALS
      # =========================================================
      - name: Get Grafana credentials
        run: |
          # Wait for secret
          for i in {1..10}; do
            if kubectl get secret -n ${{ env.NAMESPACE }} | grep grafana > /dev/null; then
              break
            fi
            echo "Waiting for Grafana secret... ($i/10)"
            sleep 5
          done
          
          GRAFANA_PASS=$(kubectl get secret -n ${{ env.NAMESPACE }} \
            -l app.kubernetes.io/name=grafana \
            -o jsonpath='{.items[0].data.admin-password}' | base64 -d)
          
          echo "✅ Grafana credentials ready"
          echo "GRAFANA_PASS=$GRAFANA_PASS" >> $GITHUB_ENV

      # =========================================================
      # OUTPUT SUMMARY
      # =========================================================
      - name: Print summary
        run: |
          cat <<'EOF'
          ==========================================
          ✅ Monitoring Server Setup Complete
          ==========================================
          
          🔒 SERVICE ENDPOINTS (Private - ClusterIP)
          ==========================================
          
          📊 Prometheus Server
             Service: kube-prometheus-stack-prometheus
             Port: 9090 (ClusterIP)
             Internal: http://prometheus:9090
          
          📈 Grafana
             Service: kube-prometheus-stack-grafana
             Port: 3000 (ClusterIP)
             Internal: http://grafana:3000
             Username: admin
             Password: ${{ env.GRAFANA_PASS }}
          
          🔔 Alertmanager
             Service: kube-prometheus-stack-alertmanager
             Port: 9093 (ClusterIP)
             Internal: http://alertmanager:9093
          
          🌐 REMOTE WRITE ENDPOINT (NodePort - For Agents)
          ==========================================
          
          Prometheus Remote Write:
             URL: http://${{ env.NODE_IP }}:${{ env.NODE_PORT }}/api/v1/write
             NodePort: 30090
             Type: NodePort (Only for inter-cluster metrics)
          
          📝 ACCESS METHODS
          ==========================================
          
          🔐 Option 1: AWS Systems Manager Session Manager
             > aws ssm start-session --target i-xxxxx
             > kubectl port-forward -n monitoring svc/kube-prometheus-stack-grafana 3000:3000
             > Open: http://localhost:3000
          
          🔐 Option 2: AWS SSM Port Forwarding (from local)
             > aws ssm start-session --target i-xxxxx \
               --document-name AWS-StartPortForwardingSession \
               --parameters '{"portNumber":["3000"],"localPortNumber":["3000"]}'
             > Open: http://localhost:3000
          
          🔐 Option 3: VPN + Direct Access (if VPN configured)
             > kubectl exec -it pod/bastion -n monitoring -- \
               kubectl port-forward svc/kube-prometheus-stack-grafana 3000:3000
             > Then access via VPN IP
          
          ⚠️  SECURITY NOTES
          ==========================================
          
          ✅ Prometheus: NodePort 30090 (only for agent remote-write)
          ✅ Grafana: ClusterIP only (NO external exposure)
          ✅ Alertmanager: ClusterIP only (internal only)
          
          🚀 NEXT STEPS
          ==========================================
          
          1. Run 'setup-monitoring-agent' for dev cluster
             > cluster_name: dev
             > Agents will remote-write to: http://${{ env.NODE_IP }}:${{ env.NODE_PORT }}
          
          2. Access Grafana securely
             > Use AWS Systems Manager Session Manager
             > Port-forward to localhost:3000
          
          3. Setup AWS Systems Manager (if not done)
             > EC2 instances need IAM role: AmazonSSMManagedInstanceCore
             > Install SSM agent on EC2
          
          ==========================================
          EOF

      # =========================================================
      # SAVE ENDPOINT CONFIG (for agent workflow)
      # =========================================================
      - name: Save endpoint configuration
        run: |
          mkdir -p /tmp/monitoring-config
          
          cat > /tmp/monitoring-config/server-endpoints.sh <<'EOF'
          #!/bin/bash
          # Prometheus Remote Write Endpoint (for agents)
          export PROMETHEUS_ENDPOINT="${{ env.PROMETHEUS_ENDPOINT }}"
          export PROMETHEUS_NODE_IP="${{ env.NODE_IP }}"
          export PROMETHEUS_NODE_PORT="${{ env.NODE_PORT }}"
          
          # Grafana Access Info (for admins)
          export GRAFANA_SERVICE="kube-prometheus-stack-grafana"
          export GRAFANA_NAMESPACE="monitoring"
          export GRAFANA_PORT="3000"
          export GRAFANA_PASSWORD="${{ env.GRAFANA_PASS }}"
          
          echo "Monitoring Endpoints:"
          echo "  Remote Write: $PROMETHEUS_ENDPOINT/api/v1/write"
          echo "  Grafana (internal): http://$GRAFANA_SERVICE:3GRAFANA_PORT"
          EOF
          
          chmod +x /tmp/monitoring-config/server-endpoints.sh
          
          echo "Configuration saved"
          cat /tmp/monitoring-config/server-endpoints.sh
