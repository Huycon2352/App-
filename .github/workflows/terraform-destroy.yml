name: Full Infrastructure Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm"
        required: true
        default: "NO"

env:
  AWS_REGION: ap-southeast-1

jobs:
  destroy:
    if: github.event.inputs.confirm_destroy == 'DESTROY'

    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================================================
      # AWS AUTH
      # =========================================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================================================
      # TERRAFORM
      # =========================================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================================================
      # INSTALL KUBECTL
      # =========================================================
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # =========================================================
      # INSTALL JQ
      # =========================================================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================================================
      # CONNECT MANAGEMENT CLUSTER
      # =========================================================
      - name: Connect Management Cluster
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name management-cluster \
            --region $AWS_REGION

      # =========================================================
      # REMOVE ARGOCD FINALIZERS
      # =========================================================
      - name: Remove ArgoCD Finalizers
        continue-on-error: true
        run: |
          kubectl get applications.argoproj.io -n argocd -o name | while read app; do
            kubectl patch $app -n argocd \
              --type merge \
              -p '{"metadata":{"finalizers":[]}}'
          done

      # =========================================================
      # DELETE ARGOCD APPS
      # =========================================================
      - name: Delete ArgoCD Applications
        continue-on-error: true
        run: |
          kubectl delete applications --all -n argocd --timeout=120s

      # =========================================================
      # DELETE LOADBALANCERS
      # =========================================================
      - name: Delete LoadBalancer Services
        continue-on-error: true
        run: |
          kubectl delete svc --all -A --timeout=120s

      # =========================================================
      # DELETE PVC
      # =========================================================
      - name: Delete PVC
        continue-on-error: true
        run: |
          kubectl delete pvc --all -A --timeout=120s

      # =========================================================
      # DELETE NAMESPACES
      # =========================================================
      - name: Delete Namespaces
        continue-on-error: true
        run: |
          kubectl delete ns argocd dev prod --timeout=120s || true

      # =========================================================
      # WAIT AWS CLEANUP
      # =========================================================
      - name: Wait AWS Cleanup
        run: sleep 120

      # =========================================================
      # DESTROY DEV
      # =========================================================
      - name: Terraform Destroy Dev
        working-directory: infrastructure/environments/dev
        run: |
          terraform init

          terraform destroy -auto-approve || \
          (sleep 60 && terraform destroy -auto-approve)

      # =========================================================
      # DESTROY MANAGEMENT
      # =========================================================
      - name: Terraform Destroy Management
        working-directory: infrastructure/environments/management
        run: |
          terraform init

          terraform destroy -auto-approve || \
          (sleep 60 && terraform destroy -auto-approve)

      # =========================================================
      # DESTROY BOOTSTRAP
      # =========================================================
      - name: Terraform Destroy Bootstrap
        working-directory: infrastructure/bootstrap
        run: |
          terraform init

          terraform destroy -auto-approve || true

      # =========================================================
      # VERIFY EKS
      # =========================================================
      - name: Verify EKS Deleted
        continue-on-error: true
        run: |
          aws eks list-clusters

      # =========================================================
      # VERIFY ELB
      # =========================================================
      - name: Verify ELB Deleted
        continue-on-error: true
        run: |
          aws elbv2 describe-load-balancers || true

      # =========================================================
      # VERIFY EBS
      # =========================================================
      - name: Verify EBS Deleted
        continue-on-error: true
        run: |
          aws ec2 describe-volumes \
            --filters Name=status,Values=available
